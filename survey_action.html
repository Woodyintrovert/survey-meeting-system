<script>
// ดึงค่า mid ไว้เป็นส่วนกลางของทั้งหน้าหน้าเว็บ
const urlParams = new URLSearchParams(window.location.search);
 const mid = urlParams.get('mid');

const midFromUrl = "<?= params.mid || '' ?>";
let currentMeetingName = ""; 

document.addEventListener("DOMContentLoaded", function () {
  if (!midFromUrl) {
    showError("❌ ไม่พบรหัสการประชุม");
    return;
  }
  loadMeetingData();
  setupMemberDatalist(); // เพิ่มการดึงรายชื่อกรรมการหลัก
});

/**
 * ดึงรายชื่อกรรมการจาก ชีต1 มาทำ Auto-complete
 */
function setupMemberDatalist() {
  google.script.run
    .withSuccessHandler(list => {
      console.log("รายชื่อที่ดึงมาได้:", list);
      
      // *** ตรวจสอบบรรทัดนี้: ต้องเป็น "members" เท่านั้น ***
      const datalist = document.getElementById("members"); 
      
      if (datalist && list) {
        // ล้างค่าเก่าและฉีดค่าใหม่เข้าไป
        datalist.innerHTML = list.map(name => `<option value="${name}">`).join("");
        console.log("ฉีดรายชื่อลงใน <datalist id='members'> เรียบร้อยแล้ว");
      }
    })
    .getCommitteeList(); // ตรวจสอบชื่อฟังก์ชันให้ตรงกับหน้า index.html
}

function loadMeetingData() {
  google.script.run
    .withSuccessHandler(renderPage)
    .withFailureHandler(err => showError("❌ เกิดข้อผิดพลาด: " + err))
    .getMeetingById(midFromUrl);
}

/**
 * ฟังก์ชันสร้างแถวตาราง (เรียกใช้ทั้งตอนโหลดและตอนเพิ่มใหม่)
 */
function createRow(memberName, index, savedData = null, isClosedSystem = false) {
  const tr = document.createElement("tr");
  // เพิ่มปุ่มลบ (class="delete") ไว้ในคอลัมน์สุดท้าย
  tr.innerHTML = `
    <td class="name"><span class="row-index"><strong>${index}.</strong></span> ${memberName}</td>
    <td><input type="checkbox" class="chk-onsite" ${savedData?.onsite ? 'checked' : ''}></td>
    <td><input type="checkbox" class="chk-online" ${savedData?.online ? 'checked' : ''}></td>
    <td><input type="checkbox" class="chk-leave" ${savedData?.leave ? 'checked' : ''}></td>
    <td><input type="checkbox" class="chk-food" ${savedData?.food ? 'checked' : ''}></td>
    <td><input class="note" type="text" placeholder="..." value="${savedData?.note || ''}"></td>
    <td>
      <div style="display:flex; align-items:center; justify-content:center; gap:5px;">
        <button class="confirm ${savedData ? 'done' : 'wait'}">${savedData ? '&#10004;' : 'ยืนยัน'}</button>
        <button class="delete" title="ลบรายชื่อนี้">✕</button>
      </div>
    </td>
  `;

  const btn = tr.querySelector("button.confirm");
  const btnDelete = tr.querySelector(".delete");
  const chkOnsite = tr.querySelector(".chk-onsite");
  const chkOnline = tr.querySelector(".chk-online");
  const chkLeave = tr.querySelector(".chk-leave");
  const chkFood = tr.querySelector(".chk-food");
  const txtNote = tr.querySelector(".note");

  const exclusiveGroup = [chkOnsite, chkOnline, chkLeave];

// 🔥 จัดการปิดกั้น (Disable) หากระบบปิด
if (isClosedSystem) {
    // 1. จัดการกลุ่ม Input
    tr.querySelectorAll('input').forEach(inp => {
      if (inp.type === "checkbox") {
        // แทนที่จะสั่ง disabled เราใช้การล็อคด้วย CSS Class แทน
        inp.classList.add("locked-checkbox");
        
        // กันเหนียวสำหรับบาง Browser: ถ้าใครพยายามกดผ่านคีย์บอร์ดให้ยกเลิก
        inp.onclick = function(e) { e.preventDefault(); return false; };
      } else {
        // ส่วนช่อง Note (Text) ยังใช้ disabled ได้ตามปกติเพื่อให้ดูต่างออกไป
        inp.disabled = true;
        inp.style.opacity = "0.6";
      }
    });

    // 2. จัดการปุ่มยืนยัน (ให้จางลงเหมือนเดิม)
    if(btn) { 
      btn.disabled = true; 
      btn.style.opacity = "0.3"; 
      btn.style.cursor = "not-allowed"; 
    }

    // 3. ซ่อนปุ่มลบ
    if(btnDelete) { 
      btnDelete.style.display = "none"; 
    }
  }

// Logic ปุ่มลบ
  btnDelete.addEventListener("click", () => {
    if (confirm(`คุณต้องการลบรายชื่อ "${memberName}" ใช่หรือไม่?`)) {
      btnDelete.disabled = true;
      btnDelete.textContent = "...";
      
      google.script.run
        .withSuccessHandler(() => {
          tr.remove(); // ลบแถวออกจากหน้าจอ
          reIndexRows(); // จัดลำดับเลขใหม่
        })
        .withFailureHandler(err => {
          alert("ลบไม่สำเร็จ: " + err);
          btnDelete.disabled = false;
          btnDelete.textContent = "x";
        })
        .removeMemberFromMeeting(midFromUrl, memberName);
    }
  });
if (savedData) {
    btn.disabled = false;
    btn.style.opacity = "1";
    btn.style.cursor = "pointer";
  }
  // ตั้งค่าปุ่มเริ่มต้น (Disabled)
  btn.disabled = true;
  btn.style.opacity = "0.5";
  btn.style.cursor = "not-allowed";

  // Logic: Mutual Exclusion (เลือกได้ข้อเดียว)
  exclusiveGroup.forEach(checkbox => {
    checkbox.addEventListener("change", function() {
      if (this.checked) {
        exclusiveGroup.forEach(other => { if (other !== this) other.checked = false; });
      }
      validateAndReset(btn, exclusiveGroup);
    });
  });

  // Logic: Reset เมื่อเปลี่ยนข้อมูล อาหาร หรือ หมายเหตุ
  [chkFood, txtNote].forEach(el => {
    el.addEventListener("input", () => validateAndReset(btn, exclusiveGroup));
    updateSummary();
  });

  // Logic: บันทึกลงชีต 2
  btn.addEventListener("click", () => {
    submitRow(btn, tr, memberName);
  });

  return tr;
}

/**
 * ฟังก์ชันจัดการปุ่ม [ส่งรหัส / เปิด-ปิดระบบ]
 */
function handleSystemToggle() {
  // --- เปลี่ยนมาอ่านค่าจาก Hidden Input แทน URL ---
  const currentMid = document.getElementById('meetingId').value;
  // --------------------------------------------

  console.log("Current MID from Hidden Input:", currentMid);

  if (!currentMid) {
    alert("ระบบไม่พบรหัสการประชุม (mid) ใน URL โปรดตรวจสอบลิงก์อีกครั้ง");
    return;
  }

  const btn = document.getElementById('btnAction');
  const codeInput = document.getElementById('adminPasscode');
  const statusLabel = document.getElementById('statusLabel').innerText;

  // 1. กรณีส่งรหัสเข้าอีเมล (ยังไม่ได้กรอกรหัส)
  if (!codeInput.value) {
    btn.disabled = true;
    btn.innerText = "กำลังส่ง...";
    
    google.script.run
      .withSuccessHandler(msg => {
        alert(msg);
        btn.disabled = false;
        btn.innerText = statusLabel.includes("ปิด") ? "ยืนยัน/ส่งรหัส" : "ยืนยัน/ส่งรหัส";
      })
      .withFailureHandler(err => {
        alert("เกิดข้อผิดพลาด: " + err.message);
        btn.disabled = false;
        btn.innerText = "ส่งรหัสอีกครั้ง";
      })
      .sendAdminPasscode(currentMid); // ใช้ค่าที่ดึงมาสดๆ
    return;
  }

  // 2. กรณีสลับสถานะ (กรอกรหัสแล้ว)
  google.script.run
    .withSuccessHandler(res => {
      if (res.success) {
        btn.innerText = "สำเร็จ! กำลังรีโหลด...";
        setTimeout(() => { window.location.href = window.location.href; }, 800);
      } else {
        alert("รหัสผ่านไม่ถูกต้อง");
        btn.disabled = false;
        btn.innerText = statusLabel.includes("ปิด") ? "ยืนยัน/ส่งรหัส" : "ยืนยัน/ส่งรหัส";
      }
    })
    .verifyAndToggleSystem(currentMid, codeInput.value); // ใช้ค่าที่ดึงมาสดๆ
}

function updateSummary() {
  const rows = document.querySelectorAll("#surveyBody tr");
  let total = rows.length;
  let onsite = 0, online = 0, leave = 0, food = 0;

  rows.forEach(row => {
    const btnConfirm = row.querySelector(".confirm");
    // 🔥 หัวใจสำคัญ: นับเฉพาะแถวที่ปุ่มมี class 'done' (แปลว่ากดยืนยันสำเร็จแล้ว)
    if (btnConfirm && btnConfirm.classList.contains("done")) {
      if (row.querySelector(".chk-onsite").checked) onsite++;
      if (row.querySelector(".chk-online").checked) online++;
      if (row.querySelector(".chk-leave").checked) leave++;
      if (row.querySelector(".chk-food").checked) food++;
    }
  });

  const responded = onsite + online + leave;
  const pending = total - responded; // รอการสำรวจ = ทั้งหมด - คนที่ยืนยันแล้ว

  // อัปเดตตัวเลขลงหน้าจอ
  document.getElementById("sumOnsite").textContent = onsite;
  document.getElementById("sumOnline").textContent = online;
  document.getElementById("sumLeave").textContent = leave;
  document.getElementById("sumFood").textContent = food;
  document.getElementById("sumPending").textContent = pending;
}

function addMember() {
  const nameInput = document.getElementById("memberInput");
  const name = nameInput.value.trim();

  if (!name) return;

  // เปลี่ยนสถานะปุ่มให้ดูว่ากำลังทำงาน
  const btn = document.getElementById("btnAddMember");
  btn.innerText = "กำลังเพิ่ม...";
  btn.disabled = true;

  google.script.run
    .withSuccessHandler(() => {
      // 1. ล้างข้อมูลในช่องกรอกให้ว่างทันที
      nameInput.value = ""; 
      
      // 2. คืนค่าสถานะปุ่ม
      btn.innerText = "เพิ่ม";
      btn.disabled = false;
      
      // 3. โหลดข้อมูลใหม่เพื่อแสดงรายชื่อที่เพิ่มเข้าไปในตาราง
      loadMeetingData(); 
      
      console.log("เพิ่มรายชื่อและล้างค่าเรียบร้อย");
    })
    .withFailureHandler(err => {
      alert("เกิดข้อผิดพลาด: " + err);
      btn.innerText = "เพิ่ม";
      btn.disabled = false;
    })
    .addMemberToMeeting(midFromUrl, name);
}

function validateAndReset(targetBtn, group) {
  const isAnySelected = group.some(chk => chk.checked);

  if (isAnySelected) {
    targetBtn.disabled = false;
    targetBtn.textContent = "ยืนยัน";
    targetBtn.className = "confirm wait";
    targetBtn.style.opacity = "1";
    targetBtn.style.cursor = "pointer";
  } else {
    targetBtn.disabled = true;
    targetBtn.textContent = "ยืนยัน";
    targetBtn.className = "confirm wait";
    targetBtn.style.opacity = "0.5";
    targetBtn.style.cursor = "not-allowed";
  }
}

function submitRow(btn, row, memberName) {
  const payload = {
    meetingId: midFromUrl,
    meetingName: currentMeetingName,
    memberName: memberName,
    onsite: row.querySelector(".chk-onsite").checked,
    online: row.querySelector(".chk-online").checked,
    leave: row.querySelector(".chk-leave").checked,
    food: row.querySelector(".chk-food").checked,
    note: row.querySelector(".note").value
  };

  btn.textContent = "..."; 
  btn.disabled = true;

  google.script.run
    .withSuccessHandler(() => {
      btn.innerHTML = "&#10004;"; 
      btn.className = "confirm done";
      btn.disabled = false; 
      updateSummary(); // <--- 🔥 เพิ่มตรงนี้! พอยืนยันปุ๊บ ยอดสรุปข้างบนจะเด้งทันที
    })
    .withFailureHandler(err => {
      alert("บันทึกล้มเหลว: " + err);
      btn.textContent = "ยืนยัน";
      btn.disabled = false;
    })
    .saveSurveyResult(payload);
}

/**
 * แปลงรูปแบบวันที่เป็นภาษาไทยเต็มรูปแบบ
 * จาก "20 มกราคม 2569" เป็น "วันอังคารที่ 20 มกราคม 2569"
 */
function formatDate(dateStr) {
  if (!dateStr) return "-";
  const d = new Date(dateStr);
  
  // ดึงชื่อวัน (เช่น วันอังคาร)
  const weekday = d.toLocaleDateString("th-TH", { weekday: 'long' });
  // ดึงวันที่ (เช่น 20)
  const day = d.toLocaleDateString("th-TH", { day: 'numeric' });
  // ดึงเดือน (เช่น มกราคม)
  const month = d.toLocaleDateString("th-TH", { month: 'long' });
  // ดึงปี พ.ศ. (เช่น 2569)
  const year = d.toLocaleDateString("th-TH", { year: 'numeric' });

  // นำมาต่อกันให้ได้รูปแบบ: วันอังคารที่ 20 มกราคม 2569
  return `${weekday}ที่ ${day} ${month} ${year}`;
}

  google.script.run.withSuccessHandler(function(isValid) {

      document.getElementById('lockIcon').innerText = '🔓';
